services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: curacuri
      POSTGRES_USER: curacuri
      POSTGRES_PASSWORD: curacuri
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: pnpm dev:api
    environment:
      PORT: "8787"
      DATABASE_URL: postgres://curacuri:curacuri@postgres:5432/curacuri
      REDIS_URL: redis://redis:6379
    ports:
      - "8787:8787"
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: pnpm dev:worker
    environment:
      DATABASE_URL: postgres://curacuri:curacuri@postgres:5432/curacuri
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  dashboard:
    build: .
    command: pnpm dev:dashboard --host 0.0.0.0
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:

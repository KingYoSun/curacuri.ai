services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: curacuri
      POSTGRES_USER: curacuri
      POSTGRES_PASSWORD: curacuri
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curacuri -d curacuri"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: pnpm dev:api
    environment:
      PORT: "8787"
      DATABASE_URL: postgres://curacuri:curacuri@postgres:5432/curacuri
      REDIS_URL: redis://redis:6379
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-30000}
      LLM_CONCURRENCY: ${LLM_CONCURRENCY:-2}
      LLM_RESPONSE_FORMAT: ${LLM_RESPONSE_FORMAT:-json_object}
      DISCORD_DRY_RUN: ${DISCORD_DRY_RUN:-true}
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: pnpm dev:worker
    environment:
      DATABASE_URL: postgres://curacuri:curacuri@postgres:5432/curacuri
      REDIS_URL: redis://redis:6379
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-30000}
      LLM_CONCURRENCY: ${LLM_CONCURRENCY:-2}
      LLM_RESPONSE_FORMAT: ${LLM_RESPONSE_FORMAT:-json_object}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_DRY_RUN: ${DISCORD_DRY_RUN:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build: .
    command: pnpm dev:dashboard --host 0.0.0.0
    environment:
      VITE_API_PROXY_TARGET: http://api:8787
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
